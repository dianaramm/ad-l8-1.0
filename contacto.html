<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>


    <!--Rejilla dividida-->
    <!-- Columnas de diferentes tamaños -->

    <div class="row">
        <div class="col-12 bg-dark text-white p-3 text-center">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
                <div class="container-fluid">
                    <a class="navbar-brand fw-bold text-uppercase fs-4" href="#">Grid&Flex Blog</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuBlog">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="menuBlog">
                        <ul class="navbar-nav ms-auto fw-bold gap-5 fs-5">
                            <li class="nav-item"><a class="nav-link " href="index.html"><i class="bi bi-house"></i> Inicio</a></li>
                            <li class="nav-item"><a class="nav-link" href="about.html"><i class="bi bi-people"></i> Quiénes Somos</a></li>
                            <li class="nav-item"><a class="nav-link active" href="contacto.html"><i class="bi bi-telephone"></i> Contacto</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </div>

    <div class="row mt-3">
        <div class="col-2 bg-danger text-white p-3 text-center fs-4">
            AD
        </div>
        <div class="col-8 bg-info text-white p-3 text-center">
            <!-- FORMULARIO¡¡-->
            <h2>FORMULARIOS</h2>

            <div class="card">
                <div class="card-header fw-bold fs-3 mb-3">
                    Formulario de contacto
                </div>
                <div class="card-body fw-bold fs-5 mb-3">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" placeholder="Tu nombre">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="correo@ejemplo.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mensaje</label>
                            <textarea class="form-control" rows="3"></textarea>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label">Acepto términos</label>
                        </div>


                        <button type="submit" class="btn btn-primary" id="liveAlertBtn">Enviar</button>
                        <div id="liveAlertPlaceholder"></div>
                    </form>
                </div>
            </div>

        </div>
        <div class="col-2 bg-secondary text-white p-3 text-center fs-4">
            News
        </div>
    </div>

    <div class="row">
        <div class="col-12 bg-dark text-white p-3 text-center">
            Pie de página
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
